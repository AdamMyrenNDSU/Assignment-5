<div class="container">
  <div class="glass-card wide">
    <h2 class="title">Add Transaction</h2>

    <div class="transaction-form">
      <!-- Type Toggle (Income vs Expense) -->
      <div class="form-field">
        <label class="field-label">Transaction Type</label>
        <div class="type-toggle">
          <button
            type="button"
            class="toggle-btn income"
            [class.active]="transactionData().type === 'income'"
            (click)="updateType('income')"
          >
            Income
          </button>
          <button
            type="button"
            class="toggle-btn expense"
            [class.active]="transactionData().type === 'expense'"
            (click)="updateType('expense')"
          >
            Expense
          </button>
        </div>
      </div>

      <!-- Amount Input with Glow -->
      <div class="form-field">
        <label class="field-label">Amount</label>
        <div class="input-wrapper">
          <input
            type="number"
            [formField]="transactionForm.amount"
            placeholder="0.00"
            class="glass-input amount"
          />
        </div>
      </div>

      <div class="row">
        <!-- Dynamic Category Dropdown -->
        <div class="form-field flex-2">
          <label class="field-label">Category</label>

          <!-- The select box changes its "glow" based on the selected category color -->
          <select
            [formField]="transactionForm.category"
            class="glass-select dynamic-select"
            [style.border-left-color]="getSelectedCategoryColor()"
          >
            <option value="" disabled selected>Select a Category</option>

            @for (cat of catService.allCategories(); track cat.name) {
              <option [value]="cat.name">{{ getIcon(cat.icon) }} {{ cat.name }}</option>
            }
            @for (cat of catService.userCategories(); track cat.id) {
              <option [value]="cat.name">{{ getIcon(cat.icon) }} {{ cat.name }}</option>
            }
          </select>
        </div>

        <!-- Date Picker -->
        <div class="form-field flex-1">
          <label class="field-label">Date</label>
          <input type="date" [formField]="transactionForm.date" class="glass-input date-input" />
        </div>
      </div>

      <!-- Notes Field -->
      <div class="form-field">
        <label class="field-label">Notes (Optional)</label>
        <textarea
          [formField]="transactionForm.notes"
          placeholder="What was this for?"
          class="glass-textarea"
        ></textarea>
      </div>

      <button class="primary-btn add-btn" (click)="save()">
        {{ editingId() ? 'Update' : 'Add' }} Transaction
      </button>
    </div>
  </div>
</div>
