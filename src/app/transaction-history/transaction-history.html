<!-- dashboard.component.html -->
<div class="dashboard-container">
  <!-- 2. Filters (Styled to match your glass inputs) -->
  <section class="glass-card filter-bar">
    <div class="filter-group">
      <!-- Date Range Section -->
      <div class="date-range-group">
        <div class="input-wrapper">
          <label class="field-label">From</label>
          <input
            type="date"
            [ngModel]="financeService.startDate()"
            (ngModelChange)="financeService.startDate.set($event)"
            class="glass-input mini"
          />
        </div>
        <div class="input-wrapper">
          <label class="field-label">To</label>
          <input
            type="date"
            [ngModel]="financeService.endDate()"
            (ngModelChange)="financeService.endDate.set($event)"
            class="glass-input mini"
          />
        </div>
      </div>

      <!-- Existing Search & Category Boxes -->
      <div class="input-wrapper search-box">
        <label class="field-label">Search</label>
        <input
          type="text"
          [ngModel]="financeService.searchQuery()"
          (ngModelChange)="financeService.searchQuery.set($event)"
          placeholder="Search notes..."
          class="glass-input"
        />
      </div>

      <div class="input-wrapper category-box">
        <label class="field-label">Category</label>
        <select
          [ngModel]="financeService.selectedCategory()"
          (ngModelChange)="financeService.selectedCategory.set($event)"
          class="glass-select"
        >
          <option value="All">All Categories</option>
          @for (cat of catService.userCategories(); track cat.id) {
            <option [value]="cat.name">{{ cat.name }}</option>
          }
        </select>
      </div>
    </div>
  </section>

  <!-- 3. Transactions List -->
  <section class="panel list-container">
    <h2>Recent History</h2>
    <table>
      <thead>
        <tr>
          <th>Category</th>
          <th>Notes</th>
          <th>Amount</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        @for (t of financeService.filteredTransactions(); track t.id) {
          <tr>
            <td>
              <span class="pill" [ngClass]="t.type">{{ t.category }}</span>
            </td>
            <td>{{ t.notes }}</td>
            <td [style.color]="t.type === 'expense' ? '#f87171' : '#4ade80'">
              {{ t.type === 'expense' ? '-' : '+' }}${{ t.amount }}
            </td>
            <td>
              <button (click)="delete(t.id!)" class="icon-btn">🗑️</button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4" style="text-align: center; padding: 40px">
              No transactions found. Start by adding one above!
            </td>
          </tr>
        }
      </tbody>
    </table>
  </section>
</div>
