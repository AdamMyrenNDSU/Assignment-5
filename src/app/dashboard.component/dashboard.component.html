<div class="container">
  <div class="dashboard-wrapper">
    <!-- Top Summary -->
    <div class="summary-grid">
      <div class="glass-card stat-card">
        <label>Total Balance</label>
        <h2 [class.negative]="finance.netBalance() < 0">{{ finance.netBalance() | currency }}</h2>
      </div>
      <div class="glass-card stat-card">
        <label>Income</label>
        <h2 class="income">{{ finance.totalIncome() | currency }}</h2>
      </div>
      <div class="glass-card stat-card">
        <label>Expenses</label>
        <h2 class="expense">{{ finance.totalExpenses() | currency }}</h2>
      </div>
    </div>

    <!-- Charts -->
    <div class="chart-grid">
      <div class="glass-card chart-container">
        <h3>Category Breakdown</h3>
        <div class="canvas-wrapper">
          <canvas #pieCanvas></canvas>
        </div>
      </div>
      <div class="glass-card chart-container">
        <h3>Cash Flow</h3>
        <div class="canvas-wrapper">
          <canvas #barCanvas></canvas>
        </div>
      </div>
    </div>

    <!-- Budget Progress -->
    <div class="glass-card budget-section">
      <div class="budget-info">
        <span>Budget Usage</span>
        <span
          >{{ finance.totalExpenses() | currency }} / {{ finance.userBudget() | currency }}</span
        >
      </div>
      <div class="progress-bar-bg">
        <div
          class="progress-fill"
          [style.width.%]="(finance.totalExpenses() / (finance.userBudget() || 1)) * 100"
          [class.danger]="finance.totalExpenses() > finance.userBudget()"
        ></div>
      </div>
    </div>
  </div>
</div>
