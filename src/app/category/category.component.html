<div class="container">
  <div class="glass-card wide">
    <h2 class="title">My Categories</h2>

    <div class="category-form">
      <!-- Better Category Typing Box -->
      <div class="form-field">
        <label class="field-label">Category Name</label>
        <div class="input-wrapper">
          <input [formField]="categoryForm.name" placeholder="e.g., Grocery" class="glass-input" />
          <span class="focus-glow"></span>
        </div>
      </div>

      <div class="row">
        <!-- Icon Selection with Label -->
        <div class="form-field flex-2">
          <label class="field-label">Select Icon</label>
          <select [formField]="categoryForm.icon" class="glass-select">
            <option value="utensils">🍴 Food & Dining</option>
            <option value="car">🚗 Transportation</option>
            <option value="home">🏠 Household/Rent</option>
            <option value="shopping-cart">🛒 Shopping</option>
            <option value="heart">❤️ Health & Wellness</option>
          </select>
        </div>

        <div class="form-field flex-6">
          <label class="field-label"> Color</label>

          <div class="color-picker-container">
            <!-- The new color header bar -->
            <div class="color-preview-header" [style.background]="categoryForm.color()"></div>

            <div class="color-picker-wrapper">
              <input type="color" [formField]="categoryForm.color" class="color-input" />
            </div>
          </div>
        </div>
      </div>

      <div class="form-field">
        <label class="field-label">Monthly Budget ($)</label>
        <div class="input-wrapper">
          <input
            type="number"
            [formField]="categoryForm.monthlyBudget"
            placeholder="0.00"
            class="glass-input"
          />
        </div>
      </div>

      <div class="button-group">
        <button class="primary-btn" (click)="save()">
          {{ editingId() ? 'Update Category' : 'Add Category' }}
        </button>
        @if (editingId()) {
          <button class="secondary-btn" (click)="cancelEdit()">Cancel</button>
        }
      </div>
    </div>

    <div class="divider">EXISTING CATEGORIES</div>

    <div class="category-list">
      @for (cat of catService.userCategories(); track cat.id) {
        <div class="category-item" [style.border-left-color]="cat.color">
          <div class="cat-content">
            <span class="cat-name">{{ cat.name }}</span>
            <span class="budget-label">Limit: ${{ cat.monthlyBudget || 0 }}</span>
          </div>

          <div class="actions">
            <!-- Edit Button -->
            <button class="edit-btn" (click)="editCategory(cat)">
              <svg
                xmlns="http://w3.org"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>

            <!-- Existing Delete Button -->
            <button class="delete-btn" (click)="deleteCategory(cat.id)">
              <svg
                xmlns="http://w3.org"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 6h18"></path>
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
              </svg>
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</div>
